<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EPM — Event Health Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #f7f8fa; color: #111318; font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d4d0c8; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #c4bfb8; }
    ::selection { background: #6d5cae20; }
    input:focus, select:focus { outline: none; border-color: #6d5cae50 !important; box-shadow: 0 0 0 3px #6d5cae10; }
    option { background: #fff; color: #1a1816; }
    button { border: none; font-family: inherit; cursor: pointer; }
    button:active { transform: scale(0.98); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    /* Subtle texture */
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 30% 0%, #6d5cae06 0%, transparent 50%); pointer-events: none; z-index: 0; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="v3/data.jsx"></script>
  <script type="text/babel" src="v3/ui.jsx"></script>
  <script type="text/babel" src="v3/fleet.jsx"></script>
  <script type="text/babel" src="v3/detail.jsx"></script>
  <script type="text/babel" src="v3/admin.jsx"></script>

  <script type="text/babel">
    const App = () => {
      const [view, setView] = React.useState('fleet');
      const [events] = React.useState(window.EVENTS3 || []);
      const [time, setTime] = React.useState(new Date());
      React.useEffect(() => { const t = setInterval(() => setTime(new Date()), 60000); return () => clearInterval(t); }, []);

      const crit = events.filter(e => e.rec === 'CRITICAL').length;
      const esc = events.filter(e => e.rec === 'ESCALATE').length;
      const totalFlags = events.reduce((s, e) => s + e.flagCount, 0);

      const navLink = (id, label, active) => React.createElement('button', {
        onClick: () => setView(id),
        style: { padding: '0 0 2px', background: 'none', border: 'none', borderBottom: active ? `1.5px solid ${T.text}` : '1.5px solid transparent', fontFamily: T.sans, fontSize: 12, fontWeight: active ? 600 : 500, color: active ? T.text : T.textDim, cursor: 'pointer', transition: 'all 0.15s', letterSpacing: 0 },
        onMouseEnter: e => { if (!active) e.target.style.color = T.textMid; },
        onMouseLeave: e => { if (!active) e.target.style.color = T.textDim; },
      }, label);

      const statPill = (val, label, color) => React.createElement('div', {
        style: { display: 'flex', alignItems: 'center', gap: 5, padding: '3px 9px 3px 7px', borderRadius: 4, background: val > 0 ? color + '08' : 'transparent', border: `1px solid ${val > 0 ? color + '15' : T.borderLight}` }
      },
        React.createElement('span', { style: { fontFamily: T.mono, fontSize: 12, fontWeight: 700, color: val > 0 ? color : T.textFaint, fontVariantNumeric: 'tabular-nums' } }, val),
        React.createElement('span', { style: { fontFamily: T.sans, fontSize: 9, color: val > 0 ? color + 'bb' : T.textFaint, fontWeight: 600, letterSpacing: 0.3 } }, label),
      );

      return React.createElement('div', { style: { display: 'flex', flexDirection: 'column', height: '100vh', position: 'relative', zIndex: 1 } },
        // Header
        React.createElement('header', {
          style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 32px', height: 46, borderBottom: `1px solid ${T.border}`, background: 'rgba(247,248,250,0.92)', backdropFilter: 'blur(20px)', position: 'sticky', top: 0, zIndex: 50, flexShrink: 0 }
        },
          React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 28 } },
            React.createElement('span', { style: { fontFamily: T.serif, fontWeight: 500, fontSize: 16, color: T.text, letterSpacing: -0.8, lineHeight: 1 } }, 'EPM'),
            React.createElement('nav', { style: { display: 'flex', gap: 20, alignItems: 'center' } },
              navLink('fleet', 'Fleet Overview', view === 'fleet'),
              navLink('admin', 'Rules Engine', view === 'admin'),
            ),
          ),
          React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 8 } },
            statPill(crit, 'crit', T.critical),
            statPill(esc, 'esc', T.escalate),
            statPill(totalFlags, 'flags', T.textMid),
            React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 5, marginLeft: 4 } },
              React.createElement('div', { style: { width: 5, height: 5, borderRadius: '50%', background: T.go, boxShadow: `0 0 6px ${T.go}50` } }),
              React.createElement('span', { style: { fontFamily: T.mono, fontSize: 10, color: T.textDim, fontWeight: 500 } }, time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })),
            ),
          ),
        ),

        // Content
        React.createElement('main', { style: { flex: 1, overflow: 'auto', paddingTop: 28 } },
          view === 'fleet' && React.createElement(FleetView3, { events }),
          view === 'admin' && React.createElement(AdminPanel3),
        ),
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
